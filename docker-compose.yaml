services:
  db:
    image: postgres:17-alpine
    container_name: pim_db
    environment:
      POSTGRES_DB: pim_db
      POSTGRES_USER: pim_user
      POSTGRES_PASSWORD: pim_password
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data

  php:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: pim_php
    volumes:
      - .:/var/www/html
    depends_on:
      - db

  nginx:
    image: nginx:alpine
    container_name: pim_nginx
    ports:
      - "8080:80"
    volumes:
      - .:/var/www/html
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - php

volumes:
  db_data: